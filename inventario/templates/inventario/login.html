<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - WMS Perforosven</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #12141d; color: #a0aec0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background-color: #1a1c23; border: 1px solid #2d3748; border-radius: 12px; width: 100%; max-width: 400px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="text-white"><i class="bi bi-box-seam text-info"></i> WebWMS</h2>
            <p class="text-muted">Perforosven - Base El Tigre</p>
        </div>

        <!-- Alerta si meten la clave mal -->
        {% if form.errors %}
            <div class="alert alert-danger py-2 text-center" style="font-size: 14px;">
                Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label text-muted small">Nombre de Usuario</label>
                <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required autofocus>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted small">Contraseña</label>
                <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
            </div>

            <button type="submit" class="btn btn-info w-100 fw-bold text-dark mb-3">
                <i class="bi bi-box-arrow-in-right"></i> Entrar al Sistema
            </button>
        </form>
        
        <div class="text-center mt-3">
            <small class="text-muted">Acceso restringido a personal autorizado.</small>
        </div>
    </div>

</body>
</html>
